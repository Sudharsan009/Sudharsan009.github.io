<!DOCTYPE html>
<html lang="en">
<head>
  <!-- If you are serving your web app in a path other than the root, change the href value below to reflect the base path you are serving from -->
  <!-- For example: <base href="/my-app/"> -->

  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <!-- Viewport meta tag: Adjust for mobile and desktop views -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>portfolio</title>
  <link rel="manifest" href="manifest.json">

  <!-- Add script to disable service workers temporarily for debugging -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(registration) {
          registration.unregister();
        });
      });
    }
  </script>
</head>
<body>
<!-- Load the Flutter bootstrap script -->
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
